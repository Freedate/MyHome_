name: Daily Article Generator

on:
  schedule:
    #- cron: '0 0 * * *'   # 오전 9시 (KST = UTC+9)
    #- cron: '0 6 * * *'   # 오후 3시 (KST)
    #- cron: '0 12 * * *'  # 오후 9시 (KST)
  workflow_dispatch:       # 수동 실행 버튼도 활성화

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install anthropic supabase

      - name: 아티클 생성
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python src/scripts/generate_article.py
